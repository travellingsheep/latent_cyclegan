# Latent CycleGAN config (SD1.5 VAE latent .pt)

# Ablation sweep root directory. run_sweep.py will overwrite this field in each snapshot.
exp_root: "../../latent_cyclegan_outputs"

data:
  # Two unpaired domains (each contains many .pt)
  a_dir: "../../projects/datasets/pt_datasets/unscaled_dataset/monet"
  b_dir: "../../projects/datasets/pt_datasets/unscaled_dataset/photo"

  # IMPORTANT: your .pt latents are NOT scaled by 0.18215
  # - If False: decode uses latents directly (recommended for your case)
  # - If True: decode will divide by vae_scaling_factor before VAE.decode
  latents_scaled: false

  # Extra latent scaling for training stability:
  # model_input = raw_latent / latent_divisor
  # visualization decode uses raw_latent = model_latent * latent_divisor
  latent_divisor: 1

  # Few-shot ablation: set to a positive number to randomly truncate each domain.
  # -1 means use all samples.
  max_samples_a: -1
  max_samples_b: -1

model:
  in_channels: 4
  out_channels: 4
  # Smaller than image CycleGAN
  ngf: 256
  ndf: 64
  n_res_blocks: 9
  d_layers: 3
  # For latents, default is unconstrained output
  out_activation: "none"  # one of: none, tanh

train:
  device: "cuda"   # "cuda" or "cpu"
  seed: 42
  batch_size: 4
  total_kimg: 214
  num_workers: 4
  amp: true

  log_every_steps: 100
  ckpt_every_kimg: 20
  vis_every_kimg: 20

  # Checkpoints
  checkpoint_dir: "../../latent_cyclegan_outputs/model"
  resume: true
  # If empty, will try {checkpoint_dir}/last.pt
  resume_path: ""
  resume_restore_rng: true

  # CycleGAN replay buffer (for discriminator updates)
  # 0 means disabled
  fake_buffer_size: 50
  fake_buffer_prob: 0.5

  lr: 0.0002
  beta1: 0.5
  beta2: 0.999

  # LR schedule: keep lr for 12.5M images, then linearly decay to 0 over next 12.5M images
  lr_constant_kimg: 107
  lr_decay_kimg: 107

  # Paper: "divide the objective by 2 while optimizing D"
  d_loss_scale: 0.5

  # CycleGAN loss weight
  lambda_cyc: 0.5

  # Identity loss: L_id = E_y||G(y)-y||1 + E_x||F(x)-x||1
  # Common practice: total adds (lambda_cyc * lambda_id) * L_id
  lambda_id: 0.1

logging:
  # tqdm fixed width; bar length is fixed via bar_format
  tqdm_ncols: 120
  tqdm_bar_len: 30

  log_dir: "../../latent_cyclegan_outputs/logs"
  log_file: "train_log.jsonl"

visualization:
  out_dir: "../../latent_cyclegan_outputs/vis"
  num_samples: 2

  # VAE for decoding latents -> RGB (for visualization only)
  # Examples:
  # - "runwayml/stable-diffusion-v1-5" with subfolder "vae"
  # - "stabilityai/sd-vae-ft-mse" (no subfolder)
  vae_model_name_or_path: "runwayml/stable-diffusion-v1-5"
  vae_subfolder: "vae"
  vae_scaling_factor: 0.18215

# Evaluation config for evaluate_latent.py (latent-space CycleGAN evaluator)
cyclegan_eval:
  # 域定义：脚本会自动构造 A2B / B2A 两个方向
  domain_A_name: "monet"
  domain_B_name: "photo"

  # 根目录定义（自动拼接 /{domain_A_name} 与 /{domain_B_name}）
  base_latent_dir: "../../projects/datasets/pt_datasets/unscaled_dataset"
  base_orig_rgb_dir: "../../projects/datasets/monet2photo_rgb/test"
  base_vae_recon_dir: "../../projects/datasets/monet2photo_rgb/test_recon"

  # 全局生成与评估控制（对每个方向生效）
  # 0 或 -1 表示不限制
  max_eval_samples: 30
  eval_seed: 42

  # eval_output_dir: 评估输出目录；会写入生成图、3-panel、metrics_report.json、metrics.csv。
  eval_output_dir: "../../latent_cyclegan_outputs/eval_cyclegan"
  # reference_cache_dir: 参考统计缓存目录；用于复用 testB 的 FID/KID/CLIP 特征。
  reference_cache_dir: "../../latent_cyclegan_outputs/eval_cache_cyclegan"
  # generator_checkpoint_path: 生成器检查点路径；为空时回退到 train.checkpoint_dir/last.pt。
  generator_checkpoint_path: "../../latent_cyclegan_outputs/model/last.pt"

  # eval_image_size: 评估时统一 resize 的边长（像素），同时影响缓存键与指标一致性。
  eval_image_size: 256
  # eval_batch_size: 推理与特征提取批大小；显存不足时可减小。
  eval_batch_size: 8
  # run_device: 运行设备，常用 "cuda" 或 "cpu"；请求 cuda 但不可用时会自动回退 cpu。
  run_device: "cuda"
  # use_bf16_autocast: 是否在 CUDA 上启用 bf16 自动混合精度推理（仅影响推理阶段）。
  use_bf16_autocast: true

  # ref_cache_max_images: 构建参考缓存时最多采样多少张目标域图；0 表示使用全部。
  ref_cache_max_images: 0
  # kid_ref_max_images: 计算 KID 时参考集最多取多少张；0 表示使用全部。
  kid_ref_max_images: 100
  # kid_num_subsets: KID 子集采样次数；越大越稳定但越慢。
  kid_num_subsets: 100
  # kid_subset_size: 每个 KID 子集大小；最终会受两域样本数上限约束。
  kid_subset_size: 1000

  # skip_lpips: 是否跳过 LPIPS 指标；在未安装 lpips 或希望加速时可设为 true。
  skip_lpips: false
  # skip_clip: 是否跳过 CLIP 指标（方向一致性与风格相似度）。
  skip_clip: false

  # clip_backbone_id: CLIP 模型 ID（transformers from_pretrained 格式）。
  clip_backbone_id: "openai/clip-vit-base-patch32"
  # clip_model_cache_dir: CLIP 模型缓存目录；为空则使用 transformers 默认缓存。
  clip_model_cache_dir: ""
  # clip_local_only: 是否只从本地缓存加载 CLIP，不联网下载。
  clip_local_only: false
  # clip_use_safetensors: 是否优先使用 safetensors 权重。
  clip_use_safetensors: false
  # clip_target_text_prompt: 可选文本原型提示词；为空时仅使用图像原型进行风格相似度评估。
  clip_target_text_prompt: ""
